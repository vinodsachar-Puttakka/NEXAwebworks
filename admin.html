<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard - Nexa</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f4f4;
    }

    h2 {
      margin-bottom: 10px;
    }

    .stats {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      flex: 1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: left;
    }

    th {
      background: black;
      color: white;
    }
  </style>
</head>
<body>

<h2>📊 Nexa Admin Dashboard</h2>

<div class="stats">
  <div class="card">
    <h3 id="totalLeads">0</h3>
    <p>Total Leads</p>
  </div>
</div>

<table id="dataTable">
  <thead>
    <tr>
      <th>Name</th>
      <th>Phone</th>
      <th>Email</th>
      <th>Service</th>
      <th>Date</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const SHEET_ID = "1X_1UpQu_DpsFbCvSwfoaWG__aJXVkhfFmU_ojG7IGcU";
const API_KEY = "AIzaSyDVZRVCOCq8yW6GcYHac7ubOAxVjsZwaBY";
const RANGE = "Sheet1!A:E";

async function loadData() {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${RANGE}?key=${API_KEY}`;

  const res = await fetch(url);
  const data = await res.json();

  const rows = data.values || [];
  const tableBody = document.querySelector("#dataTable tbody");

  tableBody.innerHTML = "";

  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${row[0] || ""}</td>
      <td>${row[1] || ""}</td>
      <td>${row[2] || ""}</td>
      <td>${row[3] || ""}</td>
      <td>${row[4] || ""}</td>
    `;

    tableBody.appendChild(tr);
  }

  document.getElementById("totalLeads").innerText = rows.length - 1;
}

loadData();
setInterval(loadData, 30000);
</script>

</body>
</html>
